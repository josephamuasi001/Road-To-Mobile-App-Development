<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and SignUp</title>
    <script src="https://kit.fontawesome.com/9451b2b3fc.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="../FINAL PROJECT/design.css">
</head>
<body>
    <div class="container">
        <div class="form-section">
            <div class="header">
            <img src="../FINAL PROJECT/download.png" alt="Logo"
            style="width: 20px;
            height: 20px;">
            <span class="logoname">SoftQA</span>
            </div>
            <span class="wm">
                <h2>Welcome Back!</h2>
                <p class="small">Sign in to access your 
                    dashboard and continue
                </p>
                <p class="small">
                    optimizing your QA process
                </p>
            </span>

            <div class="forms">
                <label for="email">Email</label>
                <span class="emailbox">
                 <input type="email"  id="email">
                </span>

                <label for="password">Password</label>
                <span class="passwordbox">
                 <input type="password"  id="password">
                </span>
                <p id="forget"><a href="">Forgot Password?</a></p>
                <span class="emailbox">
                    <button type="button">
                        Sign In
                    </button>
                </span>
                
                <p id="small">or</p>
                
                <span class="emailbox">  
                    <button>
                    Continue with Google
                        <i class="fa-brands fa-google"></i></button>
                </span>
                <span class="emailbox">  
                    <button>
                    Continue with Apple
                        <i class="fa-brands fa-apple"></i></button>
                </span>

                <p>Dont have an account? <a href="">Sign up</a></p>
            </div>
        </div>

        <div class="side-section">
            <h3>Welcome</h3>
        </div>
    </div>
</body>
</html>
